# 这是一个 GitHub Actions 工作流 daily-collect.yml，用于自动化采集知识文章并提交到仓库。
#
# 执行时间（cron: "0 8 * * *"）表示“世界标准时间（UTC）每天8点”。
# 🇨🇳在中国（东八区，UTC+8），实际上每天北京时间 16:00（下午4点）执行。
#
# 工作流整体流程解释如下：

name: Daily Collect

on:
  schedule:
    - cron: "0 8 * * *" # 每天 UTC 8:00（北京时间 16:00）自动执行
  workflow_dispatch: # 也可手动触发

permissions:
  contents: write # 允许写入代码仓库内容

jobs:
  collect:
    runs-on: ubuntu-latest # 在最新 Ubuntu 虚拟机执行

    steps:
      # 1. 拉取完整代码仓库，包括全部提交历史，方便比较文件变动。
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 配置 Python 3.11 环境并开启 pip 缓存，加速依赖安装。
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      # 3. 安装所需 Python 依赖包。
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 执行知识采集主流程。通过环境变量传入各大模型 API Key。
      #    首先运行 pipeline 脚本，然后统计并输出 LLM token 消耗和费用。
      - name: Run knowledge pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python pipeline/pipeline.py --sources github,rss --limit 20 --verbose
          python - <<'PY'
          from pipeline.cost_tracker import get_cost_tracker
          get_cost_tracker().report()
          PY

      # 5. 检查本次 run 是否新增了结构化知识条目（JSON）。
      - name: Collect newly generated article files
        id: changed
        run: |
          set -e
          new_articles=$(git diff --name-only --diff-filter=A HEAD -- knowledge/articles/*.json | tr '\n' ' ')
          echo "new_articles=$new_articles" >> "$GITHUB_OUTPUT"

      # 6. 对新增 JSON 文件做结构合法性校验（如字段、格式等）。
      - name: Validate generated JSON
        if: steps.changed.outputs.new_articles != ''
        run: |
          python hooks/validate_json.py ${{ steps.changed.outputs.new_articles }}

      # 7. 对新生成知识条目进一步做内容质量检查，如摘要长度、评分、必填字段等。
      - name: Check content quality
        if: steps.changed.outputs.new_articles != ''
        run: |
          python hooks/check_quality.py ${{ steps.changed.outputs.new_articles }}

      # 8. 如果有变更（如新增或更新了知识条目、统计图等），统一 add、commit、push 到主分支，否则打印跳过。
      - name: Commit and push changes
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git status --porcelain | grep -q .; then
            new_article_count=$(git diff --name-only --diff-filter=A HEAD -- knowledge/articles/*.json | wc -l | tr -d ' ')
            run_date=$(date -u +%F)
            git add knowledge/raw knowledge/articles pipeline/output.png pipeline/output.svg .github/workflows/daily-collect.yml
            git commit -m "chore: collect ${new_article_count} articles on ${run_date}"
            git push
          else
            echo "No changes detected; skipping commit."
          fi
