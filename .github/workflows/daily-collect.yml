name: Daily Collect

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run knowledge pipeline
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python pipeline/pipeline.py --sources github,rss --limit 20 --verbose

      - name: Validate generated JSON
        run: |
          python validate_json.py

      - name: Check content quality
        run: |
          python check_quality.py

      - name: Commit and push changes
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git status --porcelain | grep -q .; then
            article_count=$(find knowledge/articles -maxdepth 1 -name '*.json' | wc -l | tr -d ' ')
            run_date=$(date -u +%F)
            git add knowledge/raw knowledge/articles pipeline/output.png pipeline/output.svg .github/workflows/daily-collect.yml
            git commit -m "chore: collect ${article_count} articles on ${run_date}"
            git push
          else
            echo "No changes detected; skipping commit."
          fi
